<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Printable ArUco Markers</title>
  <style>
    body { font-family: sans-serif; text-align: center; background: white; color: black; }
    .marker-container { display: flex; justify-content: center; gap: 50px; margin-top: 50px; }
    .marker { text-align: center; }
    .marker img { width: 200px; height: 200px; image-rendering: pixelated; border: 1px solid #ccc; padding: 20px; }
    @media print {
      body { margin: 0; }
      .instruction { display: none; }
    }
  </style>
</head>
<body>
  <div class="instruction">
    <h1>Print These Markers</h1>
    <p>Print this page, cut out the two square markers below (including the white border), and tape them to your devices.</p>
    <button onclick="window.print()" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">Print Markers</button>
  </div>
  
  <div class="marker-container">
    <div class="marker">
      <h2>Puck (ID: 0)</h2>
      <!-- ArUco 4x4_50 ID 0 -->
      <img src="https://chev.me/arucogen/6/50/0/200.png" alt="ID 0" />
    </div>
    <div class="marker">
      <h2>Controller (ID: 1)</h2>
      <p>Top edge is the top of the image</p>
      <!-- ArUco 4x4_50 ID 1 -->
      <img src="https://chev.me/arucogen/6/50/1/200.png" alt="ID 1" />
    </div>
  </div>
</body>
</html>
